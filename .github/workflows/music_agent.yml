name: MusicHub

on:
  schedule:
    - cron: '0 4 * * *'  # Cada día a las 5:00 UTC (09:00 Barcelona)
  workflow_dispatch:      # Permite lanzarlo manualmente desde GitHub

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run music agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python -m agent.main

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.db  # Ajusta la ruta si tu DB está en otro lugar
          git diff --staged --quiet || git commit -m "chore: update memory db [skip ci]"
          git push
