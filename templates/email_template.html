<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Georgia, 'Times New Roman', serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:24px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:12px; overflow:hidden;">
          
          <!-- Header -->
          <tr>
            <td style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding:32px 40px; text-align:center;">
              <h1 style="color:#ffffff; margin:0; font-size:22px; font-weight:normal; letter-spacing:1px;">
                🎵 MusicHub
              </h1>
              <p style="color:#a8b2d1; margin:8px 0 0; font-size:13px;">
                Tu dosis diaria de buena música
              </p>
            </td>
          </tr>

          <!-- Intro -->
          <tr>
            <td style="padding:32px 40px 16px;">
              <p style="color:#333; font-size:15px; line-height:1.7; margin:0;">
                {{intro}}
              </p>
            </td>
          </tr>

          <!-- Songs -->
          {{songs_html}}

          <!-- Outro -->
          <tr>
            <td style="padding:16px 40px 32px;">
              <p style="color:#555; font-size:14px; line-height:1.6; margin:0; font-style:italic;">
                {{outro}}
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f8f8f8; padding:20px 40px; text-align:center; border-top:1px solid #eee;">
              <p style="color:#999; font-size:11px; margin:0;">
                Hecho con aprecio y buen gusto · MusicHub
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
