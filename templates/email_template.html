<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background-color:#E8E0EF; font-family:Georgia, 'Times New Roman', serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#E8E0EF; padding:24px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#F5F0F7; border-radius:12px; overflow:hidden;">
          
          <!-- Header -->
          <tr>
            <td style="background: linear-gradient(135deg, #1a0a2e 0%, #2d1054 50%, #3b0d6e 100%); padding:32px 40px; text-align:center;">
              <h1 style="color:#ede0ff; margin:0; font-size:24px; font-weight:normal; letter-spacing:3px; font-family:'Palatino Linotype', Palatino, 'Book Antiqua', serif; text-transform:uppercase;">
                🎵 MusicHub
              </h1>
              <p style="color:#c4a8e8; margin:8px 0 0; font-size:13px; font-style:italic; letter-spacing:0.5px;">
                Tu dosis diaria de buena música
              </p>
            </td>
          </tr>

          <!-- Intro -->
          <tr>
            <td style="padding:32px 40px 16px;">
              <p style="color:#2e1a44; font-size:15px; line-height:1.7; margin:0;">
                {{intro}}
              </p>
            </td>
          </tr>

          <!-- Songs -->
          {{songs_html}}

          <!-- Outro -->
          <tr>
            <td style="padding:16px 40px 32px;">
              <p style="color:#6b4d8a; font-size:14px; line-height:1.6; margin:0; font-style:italic;">
                {{outro}}
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#ede5f5; padding:20px 40px; text-align:center; border-top:1px solid #d8cce8;">
              <p style="color:#9c85b5; font-size:11px; margin:0; font-style:italic;">
                Para oídos exigentes · MusicHub · MMF
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
